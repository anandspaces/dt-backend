services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_DRIVER: sqlite
      DATABASE_URL: file:/data/app.db
      JWT_SECRET: development-only-jwt-secret-min-32-chars!
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
      - sqlite:/data

  db:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_USER: dextora
      POSTGRES_PASSWORD: dextora
      POSTGRES_DB: dextora
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dextora -d dextora"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  uploads:
  sqlite:
