# Optional local Silero TTS: docker compose --profile silero up silero-tts
# Point the API/worker at: TTS_HTTP_URL=http://silero-tts:4001/tts
services:
  silero-tts:
    profiles:
      - silero
    build:
      context: ./silero-tts
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      # Run N concurrent inference slots per process (default 1; scale horizontally with --workers).
      SILERO_CONCURRENCY: "1"
    # GPU: use a CUDA-capable base in Dockerfile and enable:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://dextora:dextora@db:5432/dextora
      JWT_SECRET: change-me-in-production-min-32-chars!
      STORAGE_LOCAL_DIR: /data/uploads
      TTS_HTTP_URL: http://silero-tts:4001/tts
      TTS_LANGUAGE: en
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dextora
      POSTGRES_PASSWORD: dextora
      POSTGRES_DB: dextora
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dextora -d dextora"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  uploads:
